<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>集點趣 - 集點卡</title>
    <meta name="description" content="集點卡頁面" />

    <script src="./localvendor/tailwind/index.global.js"></script>
    <script type="module" src="./firebase-config.js?v=2"></script>
    <link rel="stylesheet" href="./localvendor/fontawesome/css/all.min.css" />
    <link
      rel="stylesheet"
      href="./localvendor/fonts/noto-sans-tc/chinese-traditional-400.css"
    />
    <link
      rel="stylesheet"
      href="./localvendor/fonts/noto-sans-tc/chinese-traditional-500.css"
    />
    <link
      rel="stylesheet"
      href="./localvendor/fonts/noto-sans-tc/chinese-traditional-700.css"
    />
    <link
      rel="stylesheet"
      href="./localvendor/fonts/playfair-display/700.css"
    />
    <link rel="stylesheet" href="./shared.css?v=1" />

    <style>
      body {
        -webkit-tap-highlight-color: transparent;
      }

      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .inner-shadow {
        box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body class="bg-stone-50 min-h-screen">
    <div id="app"></div>

    <template id="stamp-template">
      <div
        class="max-w-md mx-auto h-screen bg-stone-50 shadow-2xl relative flex flex-col overflow-hidden ring-1 ring-stone-900/5"
      >
        <main class="flex-1 overflow-y-auto px-6 pt-6 pb-28">
          <div class="text-center space-y-1 mb-6">
            <h2 class="text-stone-500 text-xs tracking-[0.2em] uppercase">
              KIDS REWARDS
            </h2>
            <h1 class="text-3xl font-serif text-stone-800 tracking-wide">
              集點卡
            </h1>
          </div>

          <div
            v-if="isLoading"
            class="flex items-center justify-center gap-3 mb-6 text-stone-400"
          >
            <div
              class="animate-spin rounded-full h-5 w-5 border-2 border-stone-300 border-t-stone-700"
            ></div>
            <p class="text-xs tracking-wider">資料載入中...</p>
          </div>

          <div v-if="isLoading" class="flex gap-2 mt-3 pb-2 mb-6">
            <div class="h-8 w-20 rounded-full bg-stone-200 animate-pulse"></div>
            <div class="h-8 w-20 rounded-full bg-stone-200 animate-pulse"></div>
            <div class="h-8 w-20 rounded-full bg-stone-200 animate-pulse"></div>
          </div>

          <div
            v-if="isLoading"
            class="w-full bg-white rounded-3xl p-6 shadow-xl shadow-stone-200/50 ring-1 ring-stone-100 relative overflow-hidden"
          >
            <div
              class="absolute top-0 left-0 right-0 h-[9rem] opacity-10 bg-stone-300"
            ></div>

            <div class="flex justify-between items-start mb-6 relative z-10">
              <div class="space-y-2">
                <div class="h-3 w-10 rounded bg-stone-200 animate-pulse"></div>
                <div class="h-8 w-28 rounded bg-stone-200 animate-pulse"></div>
              </div>
              <div class="space-y-2 text-right">
                <div
                  class="h-3 w-10 rounded bg-stone-200 animate-pulse ml-auto"
                ></div>
                <div
                  class="h-8 w-12 rounded bg-stone-200 animate-pulse ml-auto"
                ></div>
              </div>
            </div>

            <div
              class="h-3 w-36 rounded bg-stone-200 animate-pulse mx-auto mb-4 relative z-10"
            ></div>

            <div class="grid grid-cols-5 gap-3 relative z-10">
              <div
                v-for="i in 10"
                :key="'loading-stamp-' + i"
                class="aspect-square rounded-full bg-stone-100 animate-pulse"
              ></div>
            </div>
          </div>

          <div
            v-else-if="childrenList.length > 0"
            class="flex gap-2 mt-3 overflow-x-auto pb-2 scrollbar-hide mb-6"
          >
            <button
              v-for="child in childrenList"
              :key="child.name"
              @click="searchName = child.name"
              :class="[
                'whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-all',
                searchName === child.name
                  ? getTheme(child.theme).bg + ' text-white shadow-md'
                  : 'bg-white border border-stone-200 text-stone-500 hover:bg-stone-50'
              ]"
            >
              {{ child.name }}
            </button>
          </div>

          <div
            v-if="!isLoading && isCardVisible"
            class="w-full bg-white rounded-3xl p-6 shadow-xl shadow-stone-200/50 ring-1 ring-stone-100 relative overflow-hidden"
          >
            <img
              v-if="currentBgUrl"
              :src="currentBgUrl"
              class="absolute inset-0 w-full h-full object-cover"
              alt="背景"
            />
            <div
              v-if="currentBgUrl"
              class="absolute inset-0 bg-gradient-to-b from-white/70 to-white/95"
            ></div>
            <div
              v-else
              :class="'absolute top-0 left-0 right-0 h-[9rem] opacity-10 ' + currentTheme.bg"
            ></div>

            <div class="flex justify-between items-start mb-6 relative z-10">
              <div>
                <p class="text-stone-500 text-xs mb-1 font-bold tracking-wider">
                  名字
                </p>
                <p
                  class="text-2xl font-bold text-stone-800 font-serif border-b-2 border-stone-100 pb-1 min-w-[100px]"
                >
                  {{ searchName }}
                </p>
              </div>
              <div class="text-right">
                <p class="text-stone-500 text-xs mb-1 font-bold tracking-wider">
                  獎品
                </p>
                <div
                  :class="'flex items-center justify-end gap-1 ' + currentTheme.text"
                >
                  <i class="fa-solid fa-gift"></i>
                  <span class="text-3xl font-bold leading-none"
                    >{{ stats.rewards }}</span
                  >
                </div>
              </div>
            </div>

            <p class="text-center text-stone-500 text-xs mb-3 relative z-10">
              還差
              <span :class="currentTheme.text + ' font-bold text-base mx-1'"
                >{{ 10 - stats.currentCard }}</span
              >
              點
            </p>

            <div class="grid grid-cols-5 gap-3 relative z-10">
              <div
                v-for="i in 10"
                :key="i"
                :class="[
                  'aspect-square rounded-full flex items-center justify-center text-sm font-bold transition-all duration-500 overflow-hidden',
                  i - 1 < stats.currentCard
                    ? 'bg-white ' + currentTheme.text + ' shadow-md scale-100'
                    : 'bg-stone-100 text-stone-300 scale-90 inner-shadow'
                ]"
              >
                <template v-if="i - 1 < stats.currentCard">
                  <img
                    v-if="currentStamp && currentStamp.startsWith('data:')"
                    :src="currentStamp"
                    class="w-full h-full object-contain"
                  />
                  <span v-else-if="currentStamp" class="text-lg"
                    >{{ currentStamp }}</span
                  >
                  <i v-else class="fa-solid fa-stamp"></i>
                </template>
                <template v-else>{{ i }}</template>
              </div>
            </div>
          </div>

          <div
            v-else-if="!isLoading"
            class="flex flex-col items-center justify-center text-stone-300 space-y-4 min-h-[50vh]"
          >
            <i class="fa-solid fa-user opacity-10" style="font-size: 80px"></i>
            <p>請選擇名單開始集點</p>
          </div>
        </main>

        <nav
          class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-xl border-t border-stone-100 px-6 py-3 flex justify-evenly items-center z-50 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]"
        >
          <a
            href="./stamp.html"
            class="flex flex-col items-center gap-1.5 p-2 rounded-xl text-stone-800 bg-stone-100"
          >
            <i class="fa-solid fa-stamp" style="font-size: 24px"></i>
            <span class="text-[10px] font-bold tracking-widest">集點卡</span>
          </a>
          <a
            href="./summary.html"
            class="flex flex-col items-center gap-1.5 p-2 rounded-xl text-stone-500 hover:text-stone-600"
          >
            <i class="fa-solid fa-chart-simple" style="font-size: 24px"></i>
            <span class="text-[10px] font-bold tracking-widest">狀況</span>
          </a>
        </nav>

        <div
          v-if="stampAnimation === 'done'"
          class="fixed inset-0 z-[60] flex items-center justify-center"
        >
          <div
            class="bg-white/95 backdrop-blur-sm px-10 py-8 rounded-[2rem] shadow-2xl animate-popup flex flex-col items-center border border-stone-100"
          >
            <div class="mb-4 rotate-[-12deg]">
              <i class="fa-solid fa-stamp" style="font-size: 64px"></i>
            </div>
            <p class="text-stone-800 text-lg font-bold tracking-wide">
              集點成功！
            </p>
          </div>
        </div>

        <div
          v-if="!isLoading && isCardVisible"
          class="fixed bottom-28 left-0 right-0 flex justify-center z-50 pointer-events-none"
        >
          <button
            @click="addTransaction"
            :disabled="stampAnimation !== null"
            :class="[
              'pointer-events-auto relative w-24 h-24 rounded-full shadow-2xl flex items-center justify-center transition-all text-white border-4 border-white ring-1 ring-stone-100 overflow-hidden',
              stampAnimation === 'stamping'
                ? 'scale-90 ' + currentTheme.bg
                : currentTheme.bg + ' hover:scale-105 hover:rotate-3 active:scale-90'
            ]"
          >
            <i
              v-if="stampAnimation === 'done'"
              class="fa-solid fa-check animate-bounce"
              style="font-size: 48px"
            ></i>
            <i v-else class="fa-solid fa-stamp" style="font-size: 48px"></i>
          </button>
        </div>
      </div>
    </template>

    <script src="./localvendor/vue/vue.global.js"></script>
    <script type="module">
      import {
        COLLECTIONS,
        CARD_THEMES,
        ensureAdminVerified,
        formatDate,
        getTheme,
        onFirebaseReady,
      } from "./shared.js?v=1";

      const { createApp, ref, computed, watch, onMounted, onUnmounted } = Vue;
      const PROFILE_CACHE_KEY = "stamp-profiles-cache-v1";

      createApp({
        setup() {
          const searchName = ref("");
          const stampAnimation = ref(null);
          const transactions = ref([]);
          const childrenList = ref([]);
          const isLoading = ref(true);

          let unsubTrans = null;
          let unsubProfiles = null;

          const currentChild = computed(() =>
            childrenList.value.find((c) => c.name === searchName.value),
          );

          const currentTheme = computed(() =>
            getTheme(currentChild.value?.theme),
          );
          const currentBgUrl = computed(() => currentChild.value?.bgUrl || "");
          const currentStamp = computed(() => currentChild.value?.stamp || "");

          const stats = computed(() => {
            const userTrans = transactions.value.filter(
              (t) => t.name === searchName.value,
            );
            const total = userTrans.reduce(
              (sum, t) => sum + (parseInt(t.points) || 0),
              0,
            );
            return {
              total,
              rewards: Math.floor(Math.max(0, total) / 10),
              currentCard: Math.max(0, total) % 10,
            };
          });

          const isCardVisible = computed(
            () => searchName.value && currentChild.value,
          );

          const readCachedProfiles = () => {
            try {
              const raw = localStorage.getItem(PROFILE_CACHE_KEY);
              if (!raw) return [];
              const parsed = JSON.parse(raw);
              return Array.isArray(parsed) ? parsed : [];
            } catch {
              return [];
            }
          };

          const writeCachedProfiles = (profiles) => {
            try {
              const minimalProfiles = profiles.map((p) => ({
                id: p.id || p.name,
                name: p.name || "",
                theme: p.theme || "default",
                bgUrl: p.bgUrl || "",
                stamp: p.stamp || "",
              }));
              localStorage.setItem(
                PROFILE_CACHE_KEY,
                JSON.stringify(minimalProfiles),
              );
            } catch {
              // Ignore localStorage write failures.
            }
          };

          const subscribeTransactionsByName = (name) => {
            if (!window.firebaseReady || !window.firebaseModules) {
              return;
            }

            if (unsubTrans) {
              unsubTrans();
              unsubTrans = null;
            }

            if (!name) {
              transactions.value = [];
              return;
            }

            const { collection, onSnapshot, query, where } =
              window.firebaseModules;
            const q = query(
              collection(window.db, COLLECTIONS.transactions),
              where("name", "==", name),
            );
            unsubTrans = onSnapshot(q, (snap) => {
              transactions.value = snap.docs.map((doc) => ({
                id: doc.id,
                ...doc.data(),
              }));
            });
          };

          const loadData = () => {
            const { collection, onSnapshot } = window.firebaseModules;

            unsubProfiles = onSnapshot(
              collection(window.db, COLLECTIONS.profiles),
              (snap) => {
                const profiles = snap.docs.map((doc) => ({
                  id: doc.id,
                  ...doc.data(),
                }));
                childrenList.value = profiles;
                writeCachedProfiles(profiles);
                if (!searchName.value && profiles.length > 0) {
                  searchName.value = profiles[0].name;
                }
                isLoading.value = false;
              },
              () => {
                isLoading.value = false;
              },
            );

            subscribeTransactionsByName(searchName.value);
          };

          const addTransaction = async () => {
            if (stampAnimation.value !== null) return;
            if (!searchName.value) return;
            if (!ensureAdminVerified()) return;

            stampAnimation.value = "stamping";
            setTimeout(async () => {
              try {
                const { setDoc, doc, collection } = window.firebaseModules;
                const now = new Date();
                const pad = (n, l = 2) => String(n).padStart(l, "0");
                const txId = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}-${pad(now.getMilliseconds(), 3)}-${searchName.value}`;
                await setDoc(doc(window.db, COLLECTIONS.transactions, txId), {
                  name: searchName.value,
                  points: 1,
                  type: "add",
                  timestamp: formatDate(now),
                  createdAt: now,
                });

                stampAnimation.value = "done";
                setTimeout(() => {
                  stampAnimation.value = null;
                }, 900);
              } catch (error) {
                stampAnimation.value = null;
                alert("集點失敗: " + error.message);
              }
            }, 250);
          };

          onMounted(() => {
            const params = new URLSearchParams(window.location.search);
            const fromSummaryName = params.get("name");
            const saved = localStorage.getItem("last-search-name");
            searchName.value = fromSummaryName || saved || "";

            const cachedProfiles = readCachedProfiles();
            if (cachedProfiles.length > 0) {
              childrenList.value = cachedProfiles;
              if (!searchName.value) {
                searchName.value = cachedProfiles[0].name;
              }
              isLoading.value = false;
            }

            onFirebaseReady(loadData);

            watch(
              searchName,
              (value) => {
                if (value) localStorage.setItem("last-search-name", value);
                subscribeTransactionsByName(value);
              },
              { immediate: true },
            );
          });

          onUnmounted(() => {
            if (unsubTrans) unsubTrans();
            if (unsubProfiles) unsubProfiles();
          });

          return {
            searchName,
            stampAnimation,
            childrenList,
            currentTheme,
            currentBgUrl,
            currentStamp,
            stats,
            isCardVisible,
            getTheme,
            addTransaction,
            isLoading,
          };
        },
        template: document.getElementById("stamp-template").innerHTML,
      }).mount("#app");
    </script>
  </body>
</html>
